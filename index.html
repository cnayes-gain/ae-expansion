  return {signal_analysis:analysis,next_action:action,talking_points:tps,email_subject:subj,email_body:body};

function GainsightMark(){

}

function Pips(props){
  var items=[];
  for(var i=0;i<5;i++){
    items.push(
      <div key={i} style={{
        width:7,height:7,borderRadius:2,
        background:i<props.count?"var(--gs-primary)":"var(--gs-border-section)"
      }}/>
    );
  }
  return <div style={{display:"flex",gap:3,alignItems:"center"}}>{items}</div>;
}

function Badge(props){

        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--gs-border-section)",marginBottom:24}}>
          {tabs.map(function(t,i){
            var active=i===tab;
            return(
              <button key={i} onClick={function(){setTab(i);setSigFilter("all")}}
                style={{
                  padding:"11px 20px",fontSize:13,fontWeight:active?600:400,cursor:"pointer",border:"none",
                  borderBottom:active?"2px solid var(--gs-primary)":"2px solid transparent",
                  background:"none",color:active?"var(--gs-primary)":"var(--gs-text-dim)",
                  transition:"all 0.15s",outline:"none"
                }}>
                {t.label}
                {t.badge!=null&&(
                  <span style={{
                    display:"inline-block",background:active?"var(--gs-primary)":"var(--gs-border-section)",
                    color:active?"#fff":"var(--gs-text-dim)",
                    fontSize:10,padding:"1px 7px",borderRadius:"var(--gs-radius-pill)",
                    marginLeft:6,fontWeight:700
                  }}>{t.badge}</span>
                )}
              </button>
            );
          })}
        </div>

        {/* Account table tabs */}
        {tab<=2&&(
          <div style={{animation:"fadeIn 0.25s ease"}}>
            <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
              <input type="text" placeholder="Search accounts or areas..." value={filter} onChange={function(e){setFilter(e.target.value)}}
                style={{
                  padding:"7px 14px",borderRadius:"var(--gs-radius-sm)",
                  border:"1px solid var(--gs-border)",background:"var(--gs-bg-card)",
                  color:"var(--gs-text-body)",fontSize:13,outline:"none",width:260,
                  boxShadow:"var(--gs-shadow-100)"
                }}/>
              {tab===0&&(
                <select value={sigFilter} onChange={function(e){setSigFilter(e.target.value)}}
                  style={{
                    padding:"7px 14px",borderRadius:"var(--gs-radius-sm)",
                    border:"1px solid var(--gs-border)",background:"var(--gs-bg-card)",
                    color:"var(--gs-text-body)",fontSize:13,outline:"none",
                    boxShadow:"var(--gs-shadow-100)"
                  }}>
                  <option value="all">All signals</option>
                  <option value="High">High only</option>
                  <option value="Medium">Medium only</option>
                </select>
              )}
              <select value={ownerFilter} onChange={function(e){setOwnerFilter(e.target.value)}}
                style={{
                  padding:"7px 14px",borderRadius:"var(--gs-radius-sm)",
                  border:"1px solid var(--gs-border)",background:"var(--gs-bg-card)",
                  color:"var(--gs-text-body)",fontSize:13,outline:"none",
                  boxShadow:"var(--gs-shadow-100)"
                }}>
                <option value="all">All owners</option>
                {ownerList.map(function(o){return <option key={o} value={o}>{o}</option>})}
              </select>
            </div>

            {list.length===0&&(
              <div style={{
                background:"var(--gs-bg-card)",border:"1px solid var(--gs-border-section)",
                borderRadius:"var(--gs-radius-md)",padding:"40px 24px",textAlign:"center",
                color:"var(--gs-text-dim)",boxShadow:"var(--gs-shadow-100)"
              }}>No accounts match your filter.</div>
            )}

            {list.length>0&&(
              <div style={{
                background:"var(--gs-bg-card)",border:"1px solid var(--gs-border-section)",
                borderRadius:"var(--gs-radius-md)",overflow:"hidden",
                boxShadow:"var(--gs-shadow-100)"
              }}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid var(--gs-border-section)",background:"var(--gs-bg-page)"}}>
                      {["Account","Owner","Signal","Readiness","Summary",""].map(function(h,i){
                        return(
                          <th key={i} style={{
                            textAlign:"left",fontSize:11,textTransform:"uppercase",
                            letterSpacing:"0.05em",color:"var(--gs-text-dim)",
                            padding:"10px 16px",fontWeight:600
                          }}>{h}</th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {list.map(function(ac,i){
                      return(
                        <tr key={i} style={{cursor:"pointer",transition:"background 0.12s",borderBottom:"1px solid var(--gs-border-section)"}}
                          onMouseEnter={function(e){e.currentTarget.style.background="rgba(3,105,233,0.03)"}}
                          onMouseLeave={function(e){e.currentTarget.style.background="transparent"}}>
                          <td onClick={function(){openDrawer(ac)}} style={{padding:"13px 16px",fontSize:13,fontWeight:600,color:"var(--gs-text-title)"}}>{ac.n}</td>
                          <td onClick={function(){openDrawer(ac)}} style={{padding:"13px 16px",fontSize:12,color:"var(--gs-text-dim)"}}>{getOwner(ac.n)}</td>
                          <td onClick={function(){openDrawer(ac)}} style={{padding:"13px 16px"}}><Badge type={ac.st}/></td>
                          <td onClick={function(){openDrawer(ac)}} style={{padding:"13px 16px"}}><Pips count={ac.r}/></td>
                          <td onClick={function(){openDrawer(ac)}} style={{padding:"13px 16px",color:"var(--gs-text-dim)",fontSize:12,maxWidth:300}}>{ac.s}</td>
                          <td style={{padding:"13px 16px"}}>
                            <button onClick={function(){openDrawer(ac)}}
                              style={{
                                padding:"5px 14px",borderRadius:"var(--gs-radius-xs)",fontSize:11,fontWeight:700,
                                cursor:"pointer",border:"1px solid var(--gs-primary-border)",
                                background:"var(--gs-primary-dim)",color:"var(--gs-primary)",whiteSpace:"nowrap",
                                transition:"background 0.12s"
                              }}
                              onMouseEnter={function(e){e.currentTarget.style.background="rgba(3,105,233,0.15)"}}
                              onMouseLeave={function(e){e.currentTarget.style.background="var(--gs-primary-dim)"}}>
                              Playbook
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {/* Expansion Themes tab */}
        {tab===3&&(
          <div style={{animation:"fadeIn 0.25s ease"}}>
            <div style={{fontSize:13,color:"var(--gs-text-dim)",marginBottom:20,maxWidth:800,lineHeight:1.6}}>
              <strong style={{color:"var(--gs-text-title)"}}>Expansion themes</strong> across your portfolio. Each suggests a potential bulk action or targeted campaign.
            </div>
            {sortedThemes.slice(0,12).map(function(theme,i){
              var cnt=areaMap[theme];var pct=Math.round(cnt/ACCOUNTS.length*100);
              var accts=ACCOUNTS.filter(function(a){return a.a.indexOf(theme)>-1}).map(function(a){return a.n});
              return(
                <div key={i} style={{
                  background:"var(--gs-bg-card)",border:"1px solid var(--gs-border-section)",
                  borderRadius:"var(--gs-radius-sm)",padding:"16px 20px",marginBottom:10,
                  boxShadow:"var(--gs-shadow-100)"
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontWeight:600,fontSize:14,color:"var(--gs-text-title)"}}>{theme}</span>
                    <span style={{fontSize:12,color:"var(--gs-primary)",fontWeight:600}}>{cnt} accounts ({pct}%)</span>
                  </div>
                  <div style={{background:"var(--gs-bg-page)",borderRadius:4,height:5,overflow:"hidden",marginBottom:8}}>
                    <div style={{background:"var(--gs-primary)",height:"100%",width:pct+"%",borderRadius:4}}/>
                  </div>
                  <div style={{fontSize:11,color:"var(--gs-text-dim)"}}>{accts.slice(0,5).join(", ")}{accts.length>5?" + "+(accts.length-5)+" more":""}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Drawer overlay */}
      {drawer&&(
        <div onClick={function(e){if(e.target===e.currentTarget)setDrawer(null)}}
          style={{position:"fixed",inset:0,background:"rgba(25,35,47,0.5)",zIndex:100,display:"flex",justifyContent:"flex-end"}}>
          <div style={{
            width:660,maxWidth:"100vw",height:"100vh",
            background:"var(--gs-bg-card)",borderLeft:"1px solid var(--gs-border-section)",
            overflowY:"auto",animation:"slideIn 0.22s ease",padding:28,
            boxShadow:"var(--gs-shadow-500)"
          }}>
            {/* Drawer header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,paddingBottom:20,borderBottom:"1px solid var(--gs-border-section)"}}>
              <div>
                <h2 style={{fontSize:18,fontWeight:700,margin:0,color:"var(--gs-text-title)",fontFamily:"Inter,sans-serif"}}>{drawer.n}</h2>
                <div style={{display:"flex",gap:8,alignItems:"center",marginTop:8}}>
                  <Badge type={drawer.st}/>
                  <Pips count={drawer.r}/>
                  <span style={{fontSize:11,color:"var(--gs-text-dim)"}}>{drawer.r}/5</span>
                  <span style={{fontSize:11,color:"var(--gs-text-dim)"}}>Owner: {getOwner(drawer.n)}</span>
                </div>
                <p style={{fontSize:12,color:"var(--gs-primary)",marginTop:8,lineHeight:1.5}}>{drawer.a}</p>
              </div>
              <button onClick={function(){setDrawer(null)}}
                style={{
                  background:"none",border:"1px solid var(--gs-border)",color:"var(--gs-text-dim)",
                  fontSize:18,cursor:"pointer",padding:"4px 10px",borderRadius:"var(--gs-radius-xs)",
                  lineHeight:1,transition:"background 0.12s"
                }}
                onMouseEnter={function(e){e.currentTarget.style.background="var(--gs-bg-page)"}}
                onMouseLeave={function(e){e.currentTarget.style.background="none"}}>&#x2715;</button>
            </div>

            {pb&&!pbLoad&&(
              <div>
                {/* Signal Analysis */}
                <div style={{marginBottom:24}}>
                  <div style={{
                    fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",
                    color:"var(--gs-text-dim)",marginBottom:10
                  }}>Signal Analysis</div>
                  <p style={{fontSize:13,lineHeight:1.75,whiteSpace:"pre-wrap",color:"var(--gs-text-body)"}}>{pb.signal_analysis}</p>
                </div>

                {/* Next Action */}
                <div style={{marginBottom:24}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:"var(--gs-text-dim)",marginBottom:10}}>Recommended Next Action</div>
                  <div style={{
                    background:"var(--gs-primary-dim)",border:"1px solid var(--gs-primary-border)",
                    borderRadius:"var(--gs-radius-sm)",padding:"14px 16px"
                  }}>
                    <p style={{fontSize:13,color:"var(--gs-primary)",fontWeight:600,lineHeight:1.5}}>{pb.next_action}</p>
                  </div>
                </div>

                {/* Talking Points */}
                <div style={{marginBottom:24}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:"var(--gs-text-dim)",marginBottom:10}}>Outreach Talking Points</div>
                  {(pb.talking_points||[]).map(function(tp,i){
                    return(
                      <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                        <div style={{
                          width:22,height:22,minWidth:22,borderRadius:"50%",
                          background:"var(--gs-primary)",color:"#fff",
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:11,fontWeight:700,marginTop:1
                        }}>{i+1}</div>
                        <p style={{fontSize:13,lineHeight:1.5,color:"var(--gs-text-body)"}}>{tp}</p>
                      </div>
                    );
                  })}
                </div>

                {/* Draft Email */}
                <div style={{marginBottom:24}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:"var(--gs-text-dim)",marginBottom:10}}>
                    Draft Email{pb.email_subject?": "+pb.email_subject:""}
                  </div>
                  {editing?(
                    <textarea value={editText} onChange={function(e){setEditText(e.target.value)}}
                      style={{
                        width:"100%",minHeight:200,padding:16,
                        borderRadius:"var(--gs-radius-sm)",border:"1px solid var(--gs-primary)",
                        background:"var(--gs-bg-page)",color:"var(--gs-text-body)",
                        fontSize:13,lineHeight:1.7,resize:"vertical",outline:"none",fontFamily:"inherit"
                      }}/>
                  ):(
                    <div style={{
                      background:"var(--gs-bg-page)",border:"1px solid var(--gs-border-section)",
                      borderRadius:"var(--gs-radius-sm)",padding:16,fontSize:13,lineHeight:1.7,
                      whiteSpace:"pre-wrap",maxHeight:300,overflowY:"auto",color:"var(--gs-text-body)"
                    }}>{email}</div>
                  )}
                  <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                    <button onClick={function(){if(!editing)setEditText(email);else setEmail(editText);setEditing(!editing)}}
                      style={{
                        padding:"7px 16px",borderRadius:"var(--gs-radius-xs)",fontSize:12,fontWeight:600,
                        cursor:"pointer",border:"1px solid var(--gs-border)",background:"var(--gs-bg-card)",
                        color:"var(--gs-text-body)",transition:"background 0.12s"
                      }}>{editing?"Done Editing":"Edit"}</button>
                    <button onClick={doCopy}
                      style={{
                        padding:"7px 16px",borderRadius:"var(--gs-radius-xs)",fontSize:12,fontWeight:600,
                        cursor:"pointer",border:"1px solid var(--gs-border)",background:"var(--gs-bg-card)",
                        color:copied?"var(--gs-success)":"var(--gs-text-body)",transition:"color 0.15s"
                      }}>{copied?"Copied!":"Copy"}</button>
                  </div>
                </div>

                {/* CSQL CTA */}
                <div style={{marginBottom:24}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:"var(--gs-text-dim)",marginBottom:10}}>Create CSQL CTA in Gainsight</div>
                  {!csqlOpen&&!csqlSent&&(
                    <button onClick={function(){setCsqlOpen(true)}}
                      style={{
                        width:"100%",padding:"12px 24px",borderRadius:"var(--gs-radius-sm)",
                        fontSize:14,fontWeight:600,cursor:"pointer",border:"none",
                        background:"var(--gs-primary)",color:"#fff",textAlign:"center",
                        transition:"background 0.12s",boxShadow:"var(--gs-shadow-200)"
                      }}
                      onMouseEnter={function(e){e.currentTarget.style.background="var(--gs-primary-hover)"}}
                      onMouseLeave={function(e){e.currentTarget.style.background="var(--gs-primary)"}}>
                      Create CSQL CTA for {drawer.n}
                    </button>
                  )}
                  {csqlOpen&&!csqlSent&&(
                    <div style={{
                      background:"var(--gs-bg-page)",border:"1px solid var(--gs-border-section)",
                      borderRadius:"var(--gs-radius-sm)",padding:20
                    }}>
                      <div style={{marginBottom:14}}>
                        <label style={{display:"block",fontSize:11,color:"var(--gs-text-dim)",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:600}}>CTA Name</label>
                        <input value={csqlName} onChange={function(e){setCsqlName(e.target.value)}} placeholder={"CSQL: "+drawer.n+" - Expansion Opportunity"}
                          style={{
                            width:"100%",padding:"8px 12px",borderRadius:"var(--gs-radius-xs)",
                            border:"1px solid var(--gs-border)",background:"var(--gs-bg-card)",
                            color:"var(--gs-text-body)",fontSize:13,outline:"none"
                          }}/>
                      </div>
                      <div style={{display:"flex",gap:12,marginBottom:14}}>
                        <div style={{flex:1}}>
                          <label style={{display:"block",fontSize:11,color:"var(--gs-text-dim)",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:600}}>Priority</label>
                          <select value={csqlPri} onChange={function(e){setCsqlPri(e.target.value)}}
                            style={{
                              width:"100%",padding:"8px 12px",borderRadius:"var(--gs-radius-xs)",
                              border:"1px solid var(--gs-border)",background:"var(--gs-bg-card)",
                              color:"var(--gs-text-body)",fontSize:13,outline:"none"
                            }}>
                            <option>High</option><option>Medium</option><option>Low</option>
                          </select>
                        </div>
                        <div style={{flex:1}}>
                          <label style={{display:"block",fontSize:11,color:"var(--gs-text-dim)",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:600}}>Due Date</label>
                          <input type="date" value={csqlDate} onChange={function(e){setCsqlDate(e.target.value)}}
                            style={{
                              width:"100%",padding:"8px 12px",borderRadius:"var(--gs-radius-xs)",
                              border:"1px solid var(--gs-border)",background:"var(--gs-bg-card)",
                              color:"var(--gs-text-body)",fontSize:13,outline:"none"
                            }}/>
                        </div>
                      </div>
                      <div style={{
                        fontSize:11,color:"var(--gs-text-dim)",padding:"10px 12px",
                        background:"var(--gs-bg-card)",borderRadius:"var(--gs-radius-xs)",
                        marginBottom:14,border:"1px solid var(--gs-border-section)",lineHeight:1.7
                      }}>
                        <p><strong style={{color:"var(--gs-text-body)"}}>Type:</strong> Expansion</p>
                        <p><strong style={{color:"var(--gs-text-body)"}}>Reason:</strong> Upsell Opportunity</p>
                        <p><strong style={{color:"var(--gs-text-body)"}}>Status:</strong> New</p>
                        <p style={{marginTop:6}}><strong style={{color:"var(--gs-text-body)"}}>Signal:</strong> {drawer.s}</p>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={submitCsql}
                          style={{
                            flex:1,padding:"10px 16px",borderRadius:"var(--gs-radius-xs)",fontSize:13,
                            fontWeight:600,cursor:"pointer",border:"none",
                            background:"var(--gs-primary)",color:"#fff",transition:"background 0.12s"
                          }}
                          onMouseEnter={function(e){e.currentTarget.style.background="var(--gs-primary-hover)"}}
                          onMouseLeave={function(e){e.currentTarget.style.background="var(--gs-primary)"}}>
                          Confirm and Create CTA
                        </button>
                        <button onClick={function(){setCsqlOpen(false)}}
                          style={{
                            padding:"10px 16px",borderRadius:"var(--gs-radius-xs)",fontSize:13,
                            cursor:"pointer",border:"1px solid var(--gs-border)",
                            background:"var(--gs-bg-card)",color:"var(--gs-text-body)"
                          }}>Cancel</button>
                      </div>
                    </div>
                  )}
                  {csqlSent&&(
                    <div style={{
                      background:"var(--gs-success-bg)",border:"1px solid var(--gs-success-border)",
                      borderRadius:"var(--gs-radius-sm)",padding:"14px 16px"
                    }}>
                      <p style={{fontSize:13,color:"var(--gs-success)",fontWeight:600}}>CTA created successfully.</p>
                      <button onClick={function(){setCsqlSent(false);setCsqlOpen(false)}}
                        style={{
                          marginTop:8,padding:"6px 14px",borderRadius:"var(--gs-radius-xs)",fontSize:12,
                          cursor:"pointer",border:"1px solid var(--gs-border)",
                          background:"var(--gs-bg-card)",color:"var(--gs-text-body)"
                        }}>Done</button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
